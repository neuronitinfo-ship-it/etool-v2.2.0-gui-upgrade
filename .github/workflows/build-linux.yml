name: Build Linux AppImage

on:
  release:
    types: [published, created]
  workflow_dispatch:
  workflow_call:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11']

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libusb-1.0-0 libusb-1.0-0-dev libserial-dev

      - name: Install Python dependencies
        working-directory: ./unlock_tool
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install PyInstaller==6.20.0

      - name: Build Linux Executable
        working-directory: ./unlock_tool
        run: |
          python -m PyInstaller build.spec --noconfirm --clean
          echo "Build complete! Checking output..."
          ls -la dist/

      - name: Create distribution archive
        working-directory: ./unlock_tool/dist
        run: |
          release_tag="${{ github.event.release.tag_name }}"
          if [ -z "$release_tag" ]; then
            release_tag="${{ github.ref_name }}"
          fi
          echo "Release tag: $release_tag"
          tar -czf unlock_tool-$release_tag-linux-x86_64.tar.gz unlock_tool/
          ls -lh *.tar.gz

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        if: github.event_name == 'release'
        with:
          files: |
            unlock_tool/dist/unlock_tool-*.tar.gz
          tag_name: ${{ github.event.release.tag_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release Summary
        run: |
          echo "=== Linux Build Complete ===" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Build Info:**" >> $GITHUB_STEP_SUMMARY
          echo "- Python: ${{ matrix.python-version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Platform: Linux x86_64" >> $GITHUB_STEP_SUMMARY
          echo "- Release Tag: ${{ github.event.release.tag_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Output Files:**" >> $GITHUB_STEP_SUMMARY
          ls -lh unlock_tool/dist/*.tar.gz 2>/dev/null | awk '{print "- " $9 " (" $5 ")"}' >> $GITHUB_STEP_SUMMARY

      - name: Upload Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: linux-exe-${{ matrix.python-version }}
          path: |
            unlock_tool/dist/unlock_tool
            unlock_tool/dist/unlock_tool-*.tar.gz
          retention-days: 30
