name: Build macOS DMG

on:
  release:
    types: [published, created]
  workflow_dispatch:
  workflow_call:

jobs:
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        python-version: ['3.11']

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        working-directory: ./unlock_tool
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install PyInstaller==6.20.0 dmg==0.5.6

      - name: Build macOS App
        working-directory: ./unlock_tool
        run: |
          python -m PyInstaller build.spec --noconfirm --clean --target-arch universal2
          echo "Build complete! Checking output..."
          ls -la dist/

      - name: Create macOS DMG
        working-directory: ./unlock_tool/dist
        run: |
          release_tag="${{ github.event.release.tag_name }}"
          if [ -z "$release_tag" ]; then
            release_tag="${{ github.ref_name }}"
          fi
          echo "Release tag: $release_tag"
          hdiutil create -volname "Android Servicing Tool" \
                         -srcfolder unlock_tool \
                         -ov -format UDZO \
                         unlock_tool-$release_tag-macos-universal.dmg
          ls -lh *.dmg

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        if: github.event_name == 'release'
        with:
          files: |
            unlock_tool/dist/unlock_tool-*.dmg
          tag_name: ${{ github.event.release.tag_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release Summary
        run: |
          echo "=== macOS Build Complete ===" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Build Info:**" >> $GITHUB_STEP_SUMMARY
          echo "- Python: ${{ matrix.python-version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Architecture: Universal (Intel + Apple Silicon)" >> $GITHUB_STEP_SUMMARY
          echo "- Release Tag: ${{ github.event.release.tag_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Output Files:**" >> $GITHUB_STEP_SUMMARY
          ls -lh unlock_tool/dist/*.dmg 2>/dev/null | awk '{print "- " $9}' >> $GITHUB_STEP_SUMMARY || echo "- No DMG files found" >> $GITHUB_STEP_SUMMARY

      - name: Upload Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: macos-dmg-${{ matrix.python-version }}
          path: |
            unlock_tool/dist/unlock_tool-*.dmg
          retention-days: 30
