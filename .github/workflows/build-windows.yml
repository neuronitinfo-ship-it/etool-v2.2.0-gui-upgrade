name: Build Windows EXE

on:
  release:
    types: [published, created]
  workflow_dispatch:
  workflow_call:

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ['3.11']

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        working-directory: ./unlock_tool
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install PyInstaller==6.20.0

      - name: Build Windows EXE
        working-directory: ./unlock_tool
        run: |
          python -m PyInstaller build_windows.spec --noconfirm --clean
          echo "Build complete! Checking output..."
          dir /s dist\

      - name: Create distribution archive
        working-directory: ./unlock_tool/dist
        run: |
          $release_tag = "${{ github.event.release.tag_name }}"
          if (-not $release_tag) {
            $release_tag = "${{ github.ref_name }}"
          }
          echo "Release tag: $release_tag"
          Compress-Archive -Path unlock_tool -DestinationPath "unlock_tool-$release_tag-windows-x86_64.zip" -CompressionLevel Optimal
          dir *.zip

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        if: github.event_name == 'release'
        with:
          files: |
            unlock_tool/dist/unlock_tool-*.zip
          tag_name: ${{ github.event.release.tag_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release Artifacts Summary
        run: |
          echo "=== Windows Build Complete ===" >> $env:GITHUB_STEP_SUMMARY
          echo "" >> $env:GITHUB_STEP_SUMMARY
          echo "**Build Info:**" >> $env:GITHUB_STEP_SUMMARY
          echo "- Python: ${{ matrix.python-version }}" >> $env:GITHUB_STEP_SUMMARY
          echo "- Platform: Windows x86_64" >> $env:GITHUB_STEP_SUMMARY
          echo "- Status: ✅ SUCCESS" >> $env:GITHUB_STEP_SUMMARY

      - name: Upload Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: windows-exe-${{ matrix.python-version }}
          path: |
            unlock_tool/dist/unlock_tool.exe
            unlock_tool/dist/unlock_tool-*.zip
          retention-days: 30
