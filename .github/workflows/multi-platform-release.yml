name: Multi-Platform Release Build

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-info:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Get Release Info
        id: release_info
        run: |
          echo "tag_name=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          echo "release_name=${{ github.event.release.name }}" >> $GITHUB_OUTPUT
          echo "draft=${{ github.event.release.draft }}" >> $GITHUB_OUTPUT
          
      - name: Create Build Summary
        run: |
          echo "# 🚀 Multi-Platform Build Initiated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Release Tag:** ${{ steps.release_info.outputs.tag_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Release Name:** ${{ steps.release_info.outputs.release_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Platforms Being Built:**" >> $GITHUB_STEP_SUMMARY
          echo "- 🪟 **Windows** (build-windows.yml)" >> $GITHUB_STEP_SUMMARY
          echo "- 🍎 **macOS** (build-macos.yml)" >> $GITHUB_STEP_SUMMARY
          echo "- 🐧 **Linux** (build-linux.yml)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Estimated Time:** 5-10 minutes" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All three platforms are building in parallel. Check the Actions tab for detailed progress." >> $GITHUB_STEP_SUMMARY
